name: Sincronización de Reseñas — Miramelindo

on:
  # schedule:
  #   - cron: '0 */2 * * *'   # Desactivado mientras esperamos aprobación de cuota GBP API
  workflow_dispatch:

jobs:
  sync-reviews:
    name: Sincronizar reseñas GBP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Validate GBP_LOCATIONS secret
        env:
          GBP_LOCATIONS: ${{ secrets.GBP_LOCATIONS }}
        run: |
          python <<'EOF'
          import json, os, sys

          raw = os.environ.get("GBP_LOCATIONS", "")

          if not raw:
              print("❌ GBP_LOCATIONS está VACÍO")
              sys.exit(1)

          print(f"✓ Longitud del secret: {len(raw)} chars")

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"❌ JSON inválido: {e}")
              sys.exit(1)

          print(f"✓ JSON válido, {len(data)} ubicaciones")

          errors = []
          for i, loc in enumerate(data):
              name = loc.get("name", f"item-{i}")
              prop = loc.get("property", "?")
              lid = loc.get("location_id", "")

              # Diagnóstico de formato
              lid_len = len(lid)
              lid_head = lid[:15] if lid_len >= 15 else lid
              lid_tail = lid[-10:] if lid_len >= 10 else lid

              if not lid:
                  errors.append(f"  ❌ {name} ({prop}): location_id VACÍO")
              elif "XXXXXXXXXX" in lid or "XXXX" in lid:
                  errors.append(f"  ❌ {name} ({prop}): tiene PLACEHOLDER (head='{lid_head}', tail='{lid_tail}', len={lid_len})")
              elif not lid.startswith("accounts/"):
                  errors.append(f"  ❌ {name} ({prop}): NO empieza con 'accounts/' (head='{lid_head}', tail='{lid_tail}', len={lid_len})")
              elif "/locations/" not in lid:
                  errors.append(f"  ❌ {name} ({prop}): falta '/locations/' (head='{lid_head}', tail='{lid_tail}', len={lid_len})")
              else:
                  tail = lid.split("/")[-1][-4:] if lid.split("/")[-1] else "?"
                  print(f"  ✓ {name} ({prop}): ...{tail}")

          if errors:
              print("\n--- ERRORES ---")
              for e in errors:
                  print(e)
              print("\n📋 Formato esperado: 'accounts/<ACCOUNT_ID>/locations/<LOCATION_ID>'")
              sys.exit(1)

          print("\n✅ GBP_LOCATIONS está bien configurado")
          EOF

      - name: Ejecutar sincronización
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GBP_LOCATIONS:        ${{ secrets.GBP_LOCATIONS }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:         "gemini-2.0-flash"
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO:       ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM:     ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_STAR_THRESHOLD: "3"
          PYTHONUNBUFFERED:     "1"
        run: python main.py
